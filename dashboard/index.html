<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTF 题库面板</title>
  <link rel="stylesheet" href="/dashboard/css/styles.css?v=20260302z3" />
</head>
<body>
  <header class="topbar">
    <h1>CTF 题库面板</h1>
    <div class="topbar-actions">
      <a class="top-link" href="#add-tools">添加题目/WP</a>
      <div id="stats" class="stats">加载中...</div>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section>
        <h2>分类</h2>
        <ul id="category-list" class="category-list"></ul>
      </section>
      <section>
        <h2>筛选</h2>
        <input id="search-input" type="text" placeholder="搜索题名 / event / tag" />
        <select id="status-filter">
          <option value="">全部状态</option>
          <option value="todo">待做</option>
          <option value="in_progress">进行中</option>
          <option value="done">已解决</option>
        </select>
        <select id="difficulty-filter">
          <option value="">全部难度</option>
          <option value="0">未评星</option>
          <option value="1">⭐✩✩✩✩（1 星）</option>
          <option value="2">⭐⭐✩✩✩（2 星）</option>
          <option value="3">⭐⭐⭐✩✩（3 星）</option>
          <option value="4">⭐⭐⭐⭐✩（4 星）</option>
          <option value="5">⭐⭐⭐⭐⭐（5 星）</option>
        </select>
        <select id="sort-filter">
          <option value="default">默认排序</option>
          <option value="difficulty_desc">难度：高到低</option>
          <option value="difficulty_asc">难度：低到高</option>
          <option value="name_asc">题名：A-Z</option>
        </select>
      </section>
    </aside>

    <section class="list-panel">
      <div class="panel-title">题目列表</div>
      <ul id="case-list" class="case-list"></ul>
    </section>

    <section class="detail-panel">
      <div class="panel-title detail-title">
        <span class="detail-title-main">题目详情 / WP</span>
        <span id="detail-title-name" class="detail-title-name">未选择题目</span>
        <button id="detail-save-btn" class="detail-save-btn" type="button">保存</button>
      </div>
      <div id="case-detail" class="case-detail">
        <p>请选择左侧题目查看详情。</p>
      </div>
    </section>
  </main>

  <section id="add-tools" class="add-section">
    <div class="add-section-title">添加题目/WP</div>
    <div class="add-section-grid">
      <form id="intake-form" class="mini-form">
        <div class="mini-form-title">新题入库</div>
        <label>
          题目文件
          <input id="intake-file" type="file" name="challenge" required />
        </label>
        <div class="inline-row">
          <label>
            比赛名
            <input id="intake-event" type="text" name="event" placeholder="NSSCTF" />
          </label>
          <label>
            年份
            <input id="intake-year" type="text" name="year" placeholder="2026" />
          </label>
        </div>
        <div class="inline-row">
          <label>
            大类
            <select id="intake-category" name="category">
              <option value="auto">auto（自动识别）</option>
            </select>
          </label>
          <label>
            子类
            <select id="intake-subcategory" name="subcategory" disabled>
              <option value="">自动选择</option>
            </select>
          </label>
        </div>
        <div class="inline-row">
          <label>
            题目显示名（可选）
            <input id="intake-name" type="text" name="name" placeholder="p01" />
          </label>
          <label>
            难度（可选）
            <select id="intake-difficulty" name="difficulty">
              <option value="">未设置</option>
              <option value="1">⭐✩✩✩✩（1 星）</option>
              <option value="2">⭐⭐✩✩✩（2 星）</option>
              <option value="3">⭐⭐⭐✩✩（3 星）</option>
              <option value="4">⭐⭐⭐⭐✩（4 星）</option>
              <option value="5">⭐⭐⭐⭐⭐（5 星）</option>
            </select>
          </label>
        </div>
        <label>
          标签（可选，逗号分隔）
          <input id="intake-tags" type="text" name="tags" placeholder="ida, windows, crackme" />
        </label>
        <button class="submit-main" type="submit">添加题目</button>
      </form>

      <form id="artifact-form" class="mini-form">
        <div class="mini-form-title">追加 WP/脚本</div>
        <div class="inline-row">
          <label>
            类型
            <select id="artifact-kind" name="kind" required>
              <option value="wp">wp</option>
              <option value="script">script</option>
              <option value="patch">patch</option>
              <option value="note">note</option>
              <option value="file">file</option>
            </select>
          </label>
          <label>
            状态
            <select id="artifact-status" name="status">
              <option value="">不修改</option>
              <option value="todo">待做</option>
              <option value="in_progress">进行中</option>
              <option value="done">已解决</option>
            </select>
          </label>
        </div>
        <label>
          文件
          <input id="artifact-file" type="file" name="artifact" required />
        </label>
        <label>
          指定 case（可选，不填默认当前题）
          <input id="artifact-case" type="text" name="case" placeholder="re/native-windows/p01" />
        </label>
        <button class="submit-main" type="submit">添加 WP/脚本</button>
      </form>

      <div class="mini-form">
        <div class="mini-form-title">当前题与维护</div>
        <div class="mini-actions">
          <button id="refresh-current-btn" type="button">刷新当前题</button>
          <button id="rebuild-btn" type="button">重建索引</button>
        </div>
        <pre id="current-box" class="workflow-output">当前题目：加载中...</pre>
        <pre id="log-box" class="workflow-output">操作日志：</pre>
      </div>
    </div>
  </section>

  <script type="module" src="/dashboard/js/main.js?v=20260302z3"></script>
</body>
</html>
