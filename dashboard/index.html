<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTF 题库面板</title>
  <link rel="stylesheet" href="/dashboard/css/styles.css?v=20260302" />
</head>
<body>
  <header class="topbar">
    <h1>CTF 题库面板</h1>
    <div id="stats" class="stats">加载中...</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section>
        <h2>分类</h2>
        <ul id="category-list" class="category-list"></ul>
      </section>
      <section>
        <h2>筛选</h2>
        <input id="search-input" type="text" placeholder="搜索题名 / event / tag" />
        <select id="status-filter">
          <option value="">全部状态</option>
          <option value="todo">todo</option>
          <option value="in_progress">in_progress</option>
          <option value="done">done</option>
        </select>
      </section>
    </aside>

    <section class="list-panel">
      <div class="panel-title">题目列表</div>
      <ul id="case-list" class="case-list"></ul>
    </section>

    <section class="detail-panel">
      <div class="panel-title">添加题目/WP</div>
      <div class="add-panel-body">
        <form id="intake-form" class="mini-form">
          <div class="mini-form-title">新题入库</div>
          <label>
            题目文件
            <input id="intake-file" type="file" name="challenge" required />
          </label>
          <div class="inline-row">
            <label>
              比赛名
              <input id="intake-event" type="text" name="event" placeholder="NSSCTF" />
            </label>
            <label>
              年份
              <input id="intake-year" type="text" name="year" placeholder="2026" />
            </label>
          </div>
          <button type="submit">添加题目</button>
        </form>

        <form id="artifact-form" class="mini-form">
          <div class="mini-form-title">追加 WP/脚本</div>
          <div class="inline-row">
            <label>
              类型
              <select id="artifact-kind" name="kind" required>
                <option value="wp">wp</option>
                <option value="script">script</option>
                <option value="patch">patch</option>
                <option value="note">note</option>
                <option value="file">file</option>
              </select>
            </label>
            <label>
              状态
              <select id="artifact-status" name="status">
                <option value="">不修改</option>
                <option value="todo">todo</option>
                <option value="in_progress">in_progress</option>
                <option value="done">done</option>
              </select>
            </label>
          </div>
          <label>
            文件
            <input id="artifact-file" type="file" name="artifact" required />
          </label>
          <label>
            指定 case（可选，不填默认当前题）
            <input id="artifact-case" type="text" name="case" placeholder="re/native-windows/p01" />
          </label>
          <button type="submit">添加 WP/脚本</button>
        </form>

        <div class="mini-actions">
          <button id="refresh-current-btn" type="button">刷新当前题</button>
          <button id="rebuild-btn" type="button">重建索引</button>
        </div>

        <pre id="current-box" class="workflow-output">当前题目：加载中...</pre>
        <pre id="log-box" class="workflow-output">操作日志：</pre>

        <div id="case-detail" class="case-detail compact-detail">
          <p>点左侧题目可预览 WP。选中后会自动填充到“指定 case”。</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/dashboard/js/main.js?v=20260302"></script>
</body>
</html>
